version: "3.9"

services:
  # ── Next.js Web App ─────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: omega-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - AI_ENGINE_URL=http://ai-engine:4000
      - AI_ENGINE_API_KEY=${AI_ENGINE_API_KEY}
    depends_on:
      - ai-engine
    networks:
      - omega-net
    restart: unless-stopped

  # ── AI Engine (gX-Li-Ω) ─────────────────────────────────────────────────────
  ai-engine:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: omega-ai-engine
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - AI_ENGINE_API_KEY=${AI_ENGINE_API_KEY}
      # Training parameters (override defaults)
      - LEARNING_RATE=${LEARNING_RATE:-0.001}
      - OMEGA_CONVERGENCE_THRESHOLD=${OMEGA_CONVERGENCE_THRESHOLD:-0.95}
      - LI_GROWTH_RATE=${LI_GROWTH_RATE:-0.1}
    volumes:
      - ai-models:/app/models
      - ai-checkpoints:/app/checkpoints
    networks:
      - omega-net
    restart: unless-stopped
    # RunPod GPU: uncomment when GPU resources are needed
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Python Harvesters ────────────────────────────────────────────────────────
  harvesters:
    build:
      context: ./services/harvesters
      dockerfile: Dockerfile
    container_name: omega-harvesters
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - AI_ENGINE_URL=http://ai-engine:4000
      - AI_ENGINE_API_KEY=${AI_ENGINE_API_KEY}
      - HARVEST_INTERVAL=${HARVEST_INTERVAL:-3600}
      - MAX_WORKERS=${MAX_WORKERS:-4}
    volumes:
      - harvester-data:/app/data
    depends_on:
      - ai-engine
    networks:
      - omega-net
    restart: unless-stopped

networks:
  omega-net:
    driver: bridge

volumes:
  ai-models:
  ai-checkpoints:
  harvester-data:
